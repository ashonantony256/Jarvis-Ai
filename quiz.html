<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>General Knowledge Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>General Knowledge Quiz</h1>
    <form id="quiz-form">
        <div class="question">
            <p>1. What is the capital of France?</p>
            <label><input type="radio" name="q1" value="a"> Berlin</label><br>
            <label><input type="radio" name="q1" value="b"> Madrid</label><br>
            <label><input type="radio" name="q1" value="c"> Paris</label><br>
            <label><input type="radio" name="q1" value="d"> Rome</label>
        </div>

        <div class="question">
            <p>2. Which element has the chemical symbol O?</p>
            <label><input type="radio" name="q2" value="a"> Gold</label><br>
            <label><input type="radio" name="q2" value="b"> Oxygen</label><br>
            <label><input type="radio" name="q2" value="c"> Silver</label><br>
            <label><input type="radio" name="q2" value="d"> Hydrogen</label>
        </div>

        <div class="question">
            <p>3. Who wrote “Romeo and Juliet”?</p>
            <label><input type="radio" name="q3" value="a"> Charles Dickens</label><br>
            <label><input type="radio" name="q3" value="b"> William Shakespeare</label><br>
            <label><input type="radio" name="q3" value="c"> Mark Twain</label><br>
            <label><input type="radio" name="q3" value="d"> Jane Austen</label>
        </div>

        <button type="submit">Submit Answers</button>
    </form>
</body>
</html>
